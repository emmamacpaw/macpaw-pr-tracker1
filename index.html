<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MacPaw PR Metrics Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#030712;color:white;min-height:100vh}select,input,button{font-family:inherit}table{border-collapse:collapse;width:100%}</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef}=React;
const PRODUCTS=["CleanMyMac","Setapp","Eney","CleanMyPhone","Moonlock","ClearVPN"];
const YEARLY_GOAL=2500,COMENTION_GOAL=65,CY=new Date().getFullYear(),CM=new Date().getMonth();
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CTYPES=["News Article","Feature/Profile","Mention/Brief","Interview/Q&A","Product Review","Press Release Pickup"];
const TIERS=["Tier 1","Tier 2","Tier 3","Unassigned"],SENTIMENTS=["Positive","Neutral","Negative"];
const RULES0=[{id:1,type:"Interview/Q&A",kws:"interview,q&a,we spoke with,sat down with"},{id:2,type:"Product Review",kws:"review,hands-on,tested,we tried,first look,verdict"},{id:3,type:"Press Release Pickup",kws:"announces,press release,has announced,today announced"},{id:4,type:"Feature/Profile",kws:"profile,founder story,deep dive,long read,in-depth"},{id:5,type:"Mention/Brief",kws:"also mentioned,briefly,roundup,best of,top 10,list"}];
const C={"Tier 1":"#6366f1","Tier 2":"#8b5cf6","Tier 3":"#a78bfa","Unassigned":"#374151",Positive:"#22c55e",Neutral:"#94a3b8",Negative:"#ef4444","News Article":"#3b82f6","Feature/Profile":"#f59e0b","Mention/Brief":"#10b981","Interview/Q&A":"#ec4899","Product Review":"#14b8a6","Press Release Pickup":"#f97316",CleanMyMac:"#6366f1",Setapp:"#f59e0b",Eney:"#10b981",CleanMyPhone:"#3b82f6",Moonlock:"#8b5cf6",ClearVPN:"#ef4444"};
function pdate(s){const d=new Date(s);return isNaN(d)?null:d;}
function matchRules(t,s,rules){const h=(t+" "+s).toLowerCase();for(const r of rules){if(r.kws.split(",").map(k=>k.trim()).some(k=>h.includes(k)))return r.type;}return null;}
async function callClaude(title,summary,outlet,apiKey){try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:"PR analyst for MacPaw. JSON only.\nTitle:"+(title||"N/A")+"\nOutlet:"+(outlet||"N/A")+"\nSummary:"+(summary||"N/A")+"\nProducts:"+PRODUCTS.join(",")+"\nTypes:"+CTYPES.join(",")+"\nReturn:{sentiment,sentiment_reason,products_mentioned,coverage_type,macpaw_mentioned,comention}"}]})});const data=await res.json();const text=data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"{}";return JSON.parse(text.replace(/```json|```/g,"").trim());}catch{return{sentiment:"Neutral",sentiment_reason:"Error",products_mentioned:[],coverage_type:"News Article",macpaw_mentioned:false,comention:false};}}
const card={background:"#111827",border:"1px solid #1f2937",borderRadius:12,padding:20};
const inp={background:"#1f2937",border:"1px solid #374151",borderRadius:8,padding:"5px 10px",fontSize:12,color:"white",outline:"none"};
const btn=a=>({padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:500,cursor:"pointer",border:"none",background:a?"#4f46e5":"transparent",color:a?"white":"#9ca3af"});
function Badge({label}){const c=C[label]||"#6366f1";return <span style={{background:c+"25",color:c,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{label||"--"}</span>;}
function GoalCard({label,current,goal,unit,color,description}){unit=unit||"";color=color||"#6366f1";const pct=Math.min((current/goal)*100,100),over=current>=goal;return <div style={card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><p style={{fontSize:11,color:"#6b7280",textTransform:"uppercase",margin:0}}>{label}</p><p style={{fontSize:22,fontWeight:700,color:"white",margin:"4px 0 0"}}>{unit==="%"?current.toFixed(1)+"%":current.toLocaleString()}</p></div><span style={{fontSize:11,fontWeight:600,padding:"4px 8px",borderRadius:999,background:over?"#064e3b":"#1f2937",color:over?"#34d399":"#9ca3af"}}>{over?"Goal met!":"Goal: "+(unit==="%"?goal+"%":goal.toLocaleString())}</span></div>{description&&<p style={{fontSize:11,color:"#6b7280",margin:"8px 0 0"}}>{description}</p>}<div style={{background:"#1f2937",borderRadius:999,height:6,marginTop:10}}><div style={{height:6,borderRadius:999,width:pct+"%",background:over?"#22c55e":color,transition:"width .7s"}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6b7280",marginTop:4}}><span>{pct.toFixed(1)}% of goal</span>{!over&&<span>{unit==="%"?(goal-current).toFixed(1)+"% to go":(goal-current).toLocaleString()+" to go"}</span>}</div></div>;}
function BarChart({data}){if(!data.length)return <p style={{color:"#6b7280",fontSize:13}}>No data yet</p>;const max=Math.max(...data.map(d=>d.count),1);return <div style={{display:"flex",flexDirection:"column",gap:8}}>{data.map(({label,count})=><div key={label} style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:120,fontSize:11,color:"#d1d5db",textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}}>{label}</div><div style={{flex:1,background:"#374151",borderRadius:999,height:18,position:"relative"}}><div style={{height:18,borderRadius:999,width:(count/max*100)+"%",background:C[label]||"#6366f1"}}/><span style={{position:"absolute",right:6,top:1,fontSize:11,color:"white",fontWeight:600}}>{count}</span></div></div>)}</div>;}
function DonutChart({data}){if(!data.length)return <p style={{color:"#6b7280",fontSize:13}}>No data yet</p>;const total=data.reduce((s,d)=>s+d.count,0);let off=0;const r=52,cx=70,cy=70,ci=2*Math.PI*r;const sl=data.map(d=>{const pct=d.count/total,dash=pct*ci,s={...d,pct,dash,off};off+=dash;return s;});return <div style={{display:"flex",alignItems:"center",gap:16}}><svg width="140" height="140" viewBox="0 0 140 140">{sl.map(s=><circle key={s.label} cx={cx} cy={cy} r={r} fill="none" stroke={C[s.label]||"#6366f1"} strokeWidth="22" strokeDasharray={s.dash+" "+(ci-s.dash)} strokeDashoffset={-s.off+ci*.25}/>)}<text x={cx} y={cy-4} textAnchor="middle" fill="white" fontSize="17" fontWeight="bold">{total}</text><text x={cx} y={cy+12} textAnchor="middle" fill="#6b7280" fontSize="8">articles</text></svg><div style={{display:"flex",flexDirection:"column",gap:5}}>{sl.map(s=><div key={s.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}><div style={{width:9,height:9,borderRadius:"50%",background:C[s.label]||"#6366f1",flexShrink:0}}/><span style={{color:"#d1d5db"}}>{s.label}</span><span style={{color:"white",fontWeight:600,marginLeft:2}}>{s.count}</span><span style={{color:"#6b7280"}}>({Math.round(s.pct*100)}%)</span></div>)}</div></div>;}
function PacingChart({articles}){const mt=Math.round(YEARLY_GOAL/12);const counts=Array(12).fill(0);articles.forEach(a=>{const d=pdate(a.date);if(d&&d.getFullYear()===CY)counts[d.getMonth()]++;});let ra=0,rt=0;const ca=[],ct=[];for(let m=0;m<12;m++){ra+=counts[m];rt+=mt;ca.push(ra);ct.push(rt);}const mv=Math.max(YEARLY_GOAL,...ca)||1;const W=460,H=115,pl=30,pb=18,pt=8,pr=8,iw=W-pl-pr,ih=H-pb-pt;const xp=i=>pl+(i/11)*iw,yp=v=>pt+ih-(v/mv)*ih;const ap=ca.map((v,i)=>xp(i)+","+yp(v)).join(" ");const tp2=ct.map((v,i)=>xp(i)+","+yp(v)).join(" ");const bm=Math.max(...counts,mt,1);const delta=ca[CM]-ct[CM];return <div style={card}><h2 style={{margin:"0 0 4px",fontSize:13,fontWeight:600,color:"#d1d5db"}}>Monthly Pacing {CY}</h2><p style={{fontSize:11,color:"#4b5563",margin:"0 0 10px"}}>{delta>=0?"Ahead "+delta:"Behind "+Math.abs(delta)} of pace. Target: {mt}/mo</p><svg width="100%" viewBox={"0 0 "+W+" "+H} style={{overflow:"visible",marginBottom:10}}>{[0,.25,.5,.75,1].map(f=>{const y=pt+ih*(1-f);return <g key={f}><line x1={pl} y1={y} x2={W-pr} y2={y} stroke="#1f2937" strokeWidth="1"/><text x={pl-3} y={y+3} textAnchor="end" fill="#4b5563" fontSize="8">{Math.round(f*mv)}</text></g>;})} <polyline points={tp2} fill="none" stroke="#374151" strokeWidth="1.5" strokeDasharray="4,3"/><polygon points={pl+","+(pt+ih)+" "+ap+" "+xp(CM)+","+(pt+ih)} fill="#6366f120"/><polyline points={ap.split(" ").slice(0,CM+1).join(" ")} fill="none" stroke="#6366f1" strokeWidth="2"/>{MONTHS.map((m,i)=><g key={m}><text x={xp(i)} y={H-3} textAnchor="middle" fill={i===CM?"#a5b4fc":"#4b5563"} fontSize="8" fontWeight={i===CM?"bold":"normal"}>{m}</text>{i<=CM&&<circle cx={xp(i)} cy={yp(ca[i])} r="3" fill="#6366f1" stroke="#111827" strokeWidth="1.5"/>}</g>)}</svg><div style={{display:"flex",alignItems:"flex-end",gap:2,height:44}}>{MONTHS.map((m,i)=>{const n=counts[i],iC=i===CM,iF=i>CM,bH=iF?0:Math.max((n/bm)*38,n>0?3:0),tH=(mt/bm)*38,hit=n>=mt;return <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}} title={m+": "+n}><div style={{position:"absolute",width:"100%",bottom:tH+2,borderTop:"1px dashed #374151"}}/><div style={{width:"100%",borderRadius:2,height:bH,background:iF?"transparent":hit?"#22c55e":iC?"#6366f1":"#4b5563",marginTop:"auto"}}/><span style={{fontSize:7,color:iC?"#a5b4fc":"#374151"}}>{m}</span></div>;})} </div></div>;}
export default function App(){
  const [apiKey,setApiKey]=useState(""),[ keySet,setKeySet]=useState(false),[keyInput,setKeyInput]=useState("");
  const [articles,setArticles]=useState([]),[tierMap,setTierMap]=useState({}),[rules,setRules]=useState(RULES0);
  const [analyzing,setAnalyzing]=useState(false),[progress,setProgress]=useState({done:0,total:0});
  const [tab,setTab]=useState("start"),[filterType,setFilterType]=useState("All"),[filterTier,setFilterTier]=useState("All");
  const [page,setPage]=useState(1),[pageSize,setPageSize]=useState(25),[newType,setNewType]=useState(CTYPES[0]),[newKws,setNewKws]=useState("");
  const fileRef=useRef();
  const handleFile=useCallback(e=>{const f=e.target.files[0];if(!f)return;Papa.parse(f,{header:true,skipEmptyLines:true,complete:({data})=>{const g=(r,ks)=>{for(const k of ks)if(r[k])return r[k];return "";};setArticles(data.map((r,i)=>({id:i,title:g(r,["Headline","Title","title"]),outlet:g(r,["Outlet","outlet","Publication"]),summary:g(r,["Summary","summary","Excerpt","Body"]),date:g(r,["Date","date","Published"]),url:g(r,["URL","url","Link"]),sentiment:null,products_mentioned:[],coverage_type:null,rule_type:null,final_type:null,conflict:false,resolved:false,macpaw_mentioned:false,comention:false,analyzed:false})));setTab("dashboard");}});},[]);
  const runAnalysis=async()=>{const todo=articles.filter(a=>!a.analyzed);if(!todo.length)return;setAnalyzing(true);setProgress({done:0,total:todo.length});const upd=[...articles];for(let i=0;i<todo.length;i++){const a=todo[i],ai=await callClaude(a.title,a.summary,a.outlet,apiKey);const rt=matchRules(a.title,a.summary,rules),conf=!!(rt&&rt!==ai.coverage_type);const idx=upd.findIndex(x=>x.id===a.id);upd[idx]={...upd[idx],...ai,rule_type:rt,final_type:conf?null:(rt||ai.coverage_type),conflict:conf,resolved:!conf,analyzed:true};setArticles([...upd]);setProgress({done:i+1,total:todo.length});}setAnalyzing(false);};
  const resolve=(id,pick)=>setArticles(p=>p.map(a=>a.id!==id?a:{...a,final_type:pick==="ai"?a.coverage_type:a.rule_type,resolved:true,conflict:false}));
  const setTier=(o,t)=>setTierMap(m=>({...m,[o]:t}));
  const addRule=()=>{if(!newKws.trim())return;setRules(r=>[...r,{id:Date.now(),type:newType,kws:newKws}]);setNewKws("");};
  const all=articles.filter(a=>a.analyzed),confs=all.filter(a=>a.conflict&&!a.resolved);
  const filt=all.filter(a=>(filterType==="All"||a.final_type===filterType)&&(filterTier==="All"||(tierMap[a.outlet]||"Unassigned")===filterTier));
  const tp=Math.ceil(filt.length/pageSize),pg=filt.slice((page-1)*pageSize,page*pageSize);
  const tm=all.length,cc=all.filter(a=>a.comention).length,cr=tm?cc/tm*100:0,exp=Math.round(YEARLY_GOAL/12*(CM+1)),pd2=tm-exp;
  const prodC=PRODUCTS.map(p=>({label:p,count:filt.filter(a=>(a.products_mentioned||[]).includes(p)).length})).filter(d=>d.count>0).sort((a,b)=>b.count-a.count);
  const tierC=TIERS.map(t=>({label:t,count:filt.filter(a=>(tierMap[a.outlet]||"Unassigned")===t).length})).filter(t=>t.count);
  const sentC=SENTIMENTS.map(s=>({label:s,count:filt.filter(a=>a.sentiment===s).length})).filter(s=>s.count);
  const typeC=CTYPES.map(t=>({label:t,count:filt.filter(a=>a.final_type===t).length})).filter(t=>t.count);
  const outlets=[...new Set(all.map(a=>a.outlet).filter(Boolean))];
  if(!keySet)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#030712"}}><div style={{...card,maxWidth:440,width:"100%",margin:24}}><h1 style={{fontSize:18,fontWeight:700,margin:"0 0 4px"}}>MacPaw PR Metrics Tracker</h1><p style={{color:"#6b7280",fontSize:13,margin:"0 0 20px"}}>Enter your Anthropic API key to get started.</p><label style={{fontSize:12,color:"#9ca3af",display:"block",marginBottom:6}}>Anthropic API Key</label><input value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&keyInput.startsWith("sk-")){setApiKey(keyInput);setKeySet(true);}}} placeholder="sk-ant-..." style={{...inp,width:"100%",marginBottom:12,padding:"8px 12px",fontSize:13}}/><button onClick={()=>{if(keyInput.startsWith("sk-")){setApiKey(keyInput);setKeySet(true);}}} style={{...btn(true),width:"100%",padding:"10px",fontSize:13,background:"#4f46e5"}}>Continue</button><p style={{fontSize:11,color:"#4b5563",marginTop:12,textAlign:"center"}}>Get your key at <a href="https://console.anthropic.com" target="_blank" style={{color:"#818cf8"}}>console.anthropic.com</a></p></div></div>;
  return <div style={{fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:"#030712",color:"white"}}><div style={{background:"#111827",borderBottom:"1px solid #1f2937",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><h1 style={{margin:0,fontSize:15,fontWeight:700}}>MacPaw PR Metrics</h1><p style={{margin:0,fontSize:11,color:"#6b7280"}}>MuckRack Tracker {CY}</p></div><div style={{display:"flex",alignItems:"center",gap:10}}>{confs.length>0&&<span style={{fontSize:11,background:"#451a03",border:"1px solid #92400e",color:"#fbbf24",padding:"3px 8px",borderRadius:999}}>! {confs.length} conflicts</span>}<div style={{display:"flex",gap:3}}>{[["start","Guide"],["dashboard","Dashboard"],["settings","Settings"]].map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={btn(tab===t)}>{l}</button>)}</div></div></div><div style={{padding:24,maxWidth:1100,margin:"0 auto"}}>{tab==="start"&&<div style={{maxWidth:620,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}}><div style={{...card,background:"#1e1b4b",border:"1px solid #3730a3"}}><h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:700}}>Welcome to MacPaw PR Tracker</h2><p style={{margin:0,color:"#a5b4fc",fontSize:13}}>3 steps to analyze your MuckRack coverage.</p></div>{[{n:1,t:"Export from MuckRack",b:"Coverage report, click Export, choose CSV."},{n:2,t:"Upload your CSV",b:null},{n:3,t:"Run AI analysis",b:"Claude classifies sentiment, coverage type, products and co-mentions."}].map(({n,t,b})=><div key={n} style={{...card,display:"flex",gap:14}}><div style={{width:30,height:30,borderRadius:"50%",background:"#4f46e5",color:"white",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div><div style={{flex:1}}><h3 style={{margin:"0 0 4px",fontSize:14,fontWeight:600}}>{t}</h3>{b&&<p style={{margin:"0 0 10px",color:"#9ca3af",fontSize:12}}>{b}</p>}{n===2&&<div><input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/><button onClick={()=>fileRef.current.click()} style={{...btn(true),padding:"7px 18px",fontSize:12}}>Upload CSV</button>{articles.length>0&&<span style={{color:"#34d399",fontSize:12,marginLeft:10}}>Done: {articles.length} loaded</span>}</div>}{n===3&&(analyzing?<div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9ca3af",marginBottom:5}}><span>Analyzing...</span><span>{progress.done}/{progress.total}</span></div><div style={{background:"#1f2937",borderRadius:999,height:5}}><div style={{background:"#6366f1",height:5,borderRadius:999,width:(progress.done/progress.total*100)+"%",transition:"width .3s"}}/></div></div>:<div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={runAnalysis} disabled={!articles.filter(a=>!a.analyzed).length} style={{...btn(true),background:"#059669",padding:"7px 18px",fontSize:12,opacity:articles.filter(a=>!a.analyzed).length?1:.4}}>Analyze {articles.filter(a=>!a.analyzed).length} Articles</button>{all.length>0&&<button onClick={()=>setTab("dashboard")} style={{background:"none",border:"none",color:"#818cf8",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>View Dashboard</button>}</div>)}</div></div>)}</div>}{tab==="dashboard"&&<div style={{display:"flex",flexDirection:"column",gap:20}}><div><p style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",margin:"0 0 10px"}}>2025 Goals</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><GoalCard label="Total Earned Media Mentions" current={tm} goal={YEARLY_GOAL} color="#6366f1" description={tm===0?"Upload articles to begin.":pd2>=0?"Ahead "+pd2+" for "+MONTHS[CM]:"Behind "+Math.abs(pd2)+" for "+MONTHS[CM]}/><GoalCard label="Co-mention Rate" current={parseFloat(cr.toFixed(1))} goal={COMENTION_GOAL} unit="%" color="#f59e0b" description={cc+" of "+tm+" articles mention MacPaw + product (target 65%)"}/></div></div><PacingChart articles={all}/>{!articles.length?<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:15,color:"#9ca3af"}}>No data. Go to Guide tab to upload your CSV.</p></div>:<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div style={card}><h2 style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#d1d5db"}}>Sentiment</h2><DonutChart data={sentC}/></div><div style={card}><h2 style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#d1d5db"}}>Coverage Type</h2><DonutChart data={typeC}/></div><div style={card}><h2 style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#d1d5db"}}>By Outlet Tier</h2><BarChart data={tierC}/></div><div style={card}><h2 style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#d1d5db"}}>By Product</h2><BarChart data={prodC}/></div></div>{filt.length>0&&<div style={{...card,padding:0,overflow:"hidden"}}><div style={{padding:"10px 18px",borderBottom:"1px solid #1f2937",fontSize:13,fontWeight:600,color:"#d1d5db"}}>Coverage Details</div><div style={{overflowX:"auto"}}><table><thead><tr style={{background:"#1f2937"}}>{["Title","Outlet","Date","Tier","Type","Sentiment","Products","Co-mention"].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:"#9ca3af",fontWeight:500,whiteSpace:"nowrap",fontSize:11}}>{h}</th>)}</tr></thead><tbody>{pg.map(a=><tr key={a.id} style={{borderTop:"1px solid #1f2937"}}><td style={{padding:"7px 10px",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"#e5e7eb",fontSize:11}}>{a.title||"--"}</td><td style={{padding:"7px 10px",color:"#9ca3af",maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>{a.outlet||"--"}</td><td style={{padding:"7px 10px",color:"#6b7280",whiteSpace:"nowrap",fontSize:11}}>{a.date?a.date.slice(0,10):"--"}</td><td style={{padding:"7px 10px"}}><select value={tierMap[a.outlet]||"Unassigned"} onChange={e=>setTier(a.outlet,e.target.value)} style={{...inp,padding:"2px 4px",fontSize:10}}>{TIERS.map(t=><option key={t}>{t}<  0 10px",fontSize:11,color:"#6b7280"}}>Update your Anthropic API key.</p><input defaultValue={apiKey} onBlur={e=>setApiKey(e.target.value)} style={{...inp,width:"100%"}} placeholder="sk-ant-..."/></div></div>}</div></div>;
